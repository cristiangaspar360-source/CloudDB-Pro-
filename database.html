<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudDB Pro — Cloud Database Platform</title>

  <!-- CDN Dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

  <style>
    /* ══════════════════════════════════════
       RESET & VARS
    ══════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f13;
      --bg2: #1a1a24;
      --bg3: #24243a;
      --border: #2e2e45;
      --border2: #3d3d58;
      --accent: #6366f1;
      --accent2: #818cf8;
      --text: #e8e8f0;
      --text2: #9b9bb5;
      --text3: #6b6b85;
      --success: #10b981;
      --warn: #f59e0b;
      --danger: #ef4444;
      --radius: 8px;
      --radius2: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,.4);
      --sidebar-w: 240px;
      --header-h: 48px;
      --toolbar-h: 44px;
    }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 13px; overflow: hidden; }

    /* ══════════════════════════════════════
       LOADING
    ══════════════════════════════════════ */
    #app-loading {
      position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
      background: var(--bg); z-index: 1000;
    }
    .loading-logo { font-size: 48px; animation: pulse 1.5s ease infinite; }
    .loading-title { font-size: 24px; font-weight: 700; color: var(--accent2); }
    .loading-bar { width: 200px; height: 3px; background: var(--bg3); border-radius: 99px; overflow: hidden; }
    .loading-bar::after { content:''; display:block; height:100%; background:var(--accent); animation: loading 1.5s ease infinite; }
    @keyframes loading { 0%{width:0;transform:translateX(0)} 50%{width:100%} 100%{width:0;transform:translateX(200px)} }
    @keyframes pulse { 0%,100%{opacity:.6} 50%{opacity:1} }

    /* ══════════════════════════════════════
       APP SHELL
    ══════════════════════════════════════ */
    #app-shell { display: none; height: 100vh; overflow: hidden; }
    #main-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    /* ══════════════════════════════════════
       SIDEBAR
    ══════════════════════════════════════ */
    #sidebar {
      width: var(--sidebar-w); flex-shrink: 0; background: var(--bg2);
      border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    }
    .sidebar-header {
      padding: 14px 12px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border); gap: 8px;
    }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { font-size: 22px; }
    .logo-title { font-size: 15px; font-weight: 700; color: var(--accent2); }
    .logo-sub { font-size: 10px; color: var(--text3); }
    .sidebar-search { padding: 8px 10px; border-bottom: 1px solid var(--border); }
    .sidebar-search input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 10px; color: var(--text); font-size: 12px; }
    .table-list { flex: 1; overflow-y: auto; padding: 6px 0; }
    .table-item {
      display: flex; align-items: center; gap: 8px; padding: 7px 10px; cursor: pointer;
      border-radius: var(--radius); margin: 1px 6px; transition: background .15s; position: relative;
    }
    .table-item:hover { background: var(--bg3); }
    .table-item.active { background: rgba(99,102,241,.15); }
    .table-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .table-name { flex: 1; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .table-count { font-size: 11px; color: var(--text3); background: var(--bg3); padding: 1px 6px; border-radius: 10px; }
    .table-actions { display: none; gap: 2px; }
    .table-item:hover .table-actions { display: flex; }
    .tbl-action-btn { background: none; border: none; cursor: pointer; padding: 2px 5px; color: var(--text3); border-radius: 4px; font-size: 12px; }
    .tbl-action-btn:hover { background: var(--border2); color: var(--text); }
    .sidebar-footer { border-top: 1px solid var(--border); padding: 8px; }
    .sidebar-nav-btn { width: 100%; background: none; border: none; cursor: pointer; color: var(--text2); text-align: left; padding: 7px 10px; border-radius: var(--radius); font-size: 12px; transition: all .15s; }
    .sidebar-nav-btn:hover { background: var(--bg3); color: var(--text); }

    /* ══════════════════════════════════════
       TABLE HEADER
    ══════════════════════════════════════ */
    #table-header {
      height: var(--header-h); display: flex; align-items: center; gap: 8px; padding: 0 14px;
      border-bottom: 1px solid var(--border); background: var(--bg2); flex-shrink: 0;
    }
    #table-title-area { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    #table-icon { font-size: 18px; }
    #table-title { font-size: 16px; font-weight: 600; color: var(--text); }
    .row-count-badge { font-size: 11px; color: var(--text3); background: var(--bg3); padding: 2px 8px; border-radius: 10px; }
    #view-tabs { display: flex; align-items: center; gap: 2px; flex: 1; overflow-x: auto; padding: 0 8px; }
    .view-tab {
      display: flex; align-items: center; gap: 6px; padding: 5px 12px; background: none; border: none;
      cursor: pointer; color: var(--text2); border-radius: var(--radius); font-size: 12px; white-space: nowrap;
      transition: all .15s; border-bottom: 2px solid transparent;
    }
    .view-tab:hover { color: var(--text); background: var(--bg3); }
    .view-tab.active { color: var(--accent2); border-bottom-color: var(--accent); }

    /* ══════════════════════════════════════
       TOOLBAR
    ══════════════════════════════════════ */
    #toolbar {
      height: var(--toolbar-h); display: flex; align-items: center; gap: 4px; padding: 0 12px;
      border-bottom: 1px solid var(--border); background: var(--bg2); flex-shrink: 0;
    }
    .toolbar-left, .toolbar-right { display: flex; align-items: center; gap: 4px; }
    .toolbar-center { flex: 1; display: flex; justify-content: center; }
    .toolbar-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
    .toolbar-btn {
      display: flex; align-items: center; gap: 5px; padding: 5px 10px; background: none;
      border: none; cursor: pointer; color: var(--text2); border-radius: var(--radius); font-size: 12px;
      transition: all .15s; white-space: nowrap;
    }
    .toolbar-btn:hover { background: var(--bg3); color: var(--text); }
    .search-wrap { position: relative; display: flex; align-items: center; }
    .search-icon { position: absolute; left: 8px; font-size: 12px; }
    #global-search { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 5px 10px 5px 26px; color: var(--text); font-size: 12px; width: 220px; }
    #global-search:focus { outline: none; border-color: var(--accent); }

    /* Active Filters Bar */
    #active-filters { flex-shrink: 0; }
    .active-filters-bar { display: flex; align-items: center; gap: 6px; padding: 5px 14px; background: rgba(99,102,241,.08); border-bottom: 1px solid rgba(99,102,241,.2); flex-wrap: wrap; }
    .af-label { font-size: 11px; color: var(--text3); }
    .af-chip { background: rgba(99,102,241,.2); color: var(--accent2); padding: 2px 8px; border-radius: 10px; font-size: 11px; }
    .af-clear { background: none; border: none; cursor: pointer; color: var(--danger); font-size: 11px; margin-left: auto; }

    /* ══════════════════════════════════════
       VIEW CONTAINER
    ══════════════════════════════════════ */
    #view-container { flex: 1; overflow: auto; background: var(--bg); }

    /* ══════════════════════════════════════
       GRID
    ══════════════════════════════════════ */
    .grid-wrap { overflow: auto; height: 100%; }
    .db-grid { border-collapse: collapse; min-width: 100%; table-layout: fixed; }
    .db-grid thead { position: sticky; top: 0; z-index: 10; }
    .th-col {
      background: var(--bg2); border-right: 1px solid var(--border); border-bottom: 2px solid var(--border);
      padding: 0; cursor: pointer; white-space: nowrap; user-select: none;
    }
    .th-inner { display: flex; align-items: center; gap: 6px; padding: 0 10px; height: 34px; }
    .col-name { flex: 1; font-size: 12px; font-weight: 500; color: var(--text2); overflow: hidden; text-overflow: ellipsis; }
    .th-check, .td-check { width: 40px; text-align: center; background: var(--bg2); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .th-add { background: var(--bg2); border-bottom: 2px solid var(--border); width: 40px; text-align: center; }
    .th-add button { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 18px; line-height: 1; padding: 4px 8px; }
    .th-add button:hover { color: var(--text); }
    .th-menu-btn { background: none; border: none; cursor: pointer; color: var(--text3); padding: 2px 4px; border-radius: 4px; opacity: 0; font-size: 14px; }
    .th-col:hover .th-menu-btn { opacity: 1; }
    .th-menu-btn:hover { color: var(--text); background: var(--border); }

    .db-row:hover td { background: rgba(99,102,241,.04); }
    .db-row.selected td { background: rgba(99,102,241,.1); }
    .db-cell {
      border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
      padding: 0 10px; height: 36px; cursor: pointer; overflow: hidden; max-width: 0; white-space: nowrap;
      text-overflow: ellipsis; vertical-align: middle;
    }
    .db-cell:hover { background: rgba(255,255,255,.03) !important; }

    /* Cell types */
    .cell-text { color: var(--text); }
    .cell-num { color: var(--text); text-align: right; display: block; }
    .cell-date { color: var(--text2); font-size: 12px; }
    .cell-date.sys { color: var(--text3); }
    .cell-rn { color: var(--text3); font-size: 11px; }
    .cell-bool { font-size: 14px; }
    .bool-true { color: var(--success); }
    .bool-false { color: var(--text3); }
    .cell-link { color: var(--accent2); text-decoration: none; }
    .cell-link:hover { text-decoration: underline; }
    .cell-tag {
      display: inline-block; padding: 2px 8px; border-radius: 10px;
      font-size: 11px; font-weight: 500; color: #1e1e2e;
    }
    .cell-pct { display: flex; align-items: center; gap: 6px; }
    .pct-bar { height: 6px; border-radius: 3px; background: var(--accent); min-width: 2px; }
    .cell-rating { color: var(--warn); font-size: 13px; letter-spacing: 1px; }
    .cell-formula { color: var(--accent2); }
    .cell-json { color: var(--text3); font-family: monospace; font-size: 11px; }

    /* Inline editor */
    .cell-editor { width: 100%; height: 100%; background: var(--bg2); border: 2px solid var(--accent); color: var(--text); padding: 2px 6px; font-size: 13px; outline: none; }
    .cell-editor-check { width: 16px; height: 16px; cursor: pointer; }

    /* Type icon */
    .type-icon { font-size: 11px; color: var(--text3); }

    /* Grid summary */
    .grid-summary { display: flex; position: sticky; bottom: 0; background: var(--bg2); border-top: 1px solid var(--border); }
    .summary-cell { padding: 4px 10px; font-size: 11px; color: var(--text3); border-right: 1px solid var(--border); flex-shrink: 0; }

    /* ══════════════════════════════════════
       KANBAN
    ══════════════════════════════════════ */
    .kanban-board { display: flex; gap: 14px; padding: 16px; height: 100%; overflow-x: auto; align-items: flex-start; }
    .kanban-col { background: var(--bg2); border-radius: var(--radius2); min-width: 270px; max-width: 270px; flex-shrink: 0; max-height: calc(100vh - 160px); display: flex; flex-direction: column; }
    .kanban-col-header { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-bottom: 1px solid var(--border); }
    .kanban-tag { padding: 2px 10px; border-radius: 10px; font-size: 12px; font-weight: 600; color: #1e1e2e; }
    .kanban-count { font-size: 11px; color: var(--text3); background: var(--bg3); padding: 1px 6px; border-radius: 10px; margin-left: auto; }
    .kanban-add { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 18px; padding: 0 4px; line-height: 1; }
    .kanban-add:hover { color: var(--text); }
    .kanban-cards { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 8px; }
    .kanban-card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; cursor: pointer; transition: all .15s; }
    .kanban-card:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.3); }
    .kanban-card-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
    .kanban-card-meta { display: flex; flex-direction: column; gap: 3px; }
    .kanban-meta-item { font-size: 11px; color: var(--text3); }

    /* ══════════════════════════════════════
       GALLERY
    ══════════════════════════════════════ */
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; padding: 16px; }
    .gallery-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius2); overflow: hidden; cursor: pointer; transition: all .15s; }
    .gallery-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow); }
    .gallery-card-img { height: 100px; display: flex; align-items: center; justify-content: center; }
    .gallery-card-initials { font-size: 36px; font-weight: 700; color: rgba(255,255,255,.4); }
    .gallery-card-body { padding: 12px; }
    .gallery-card-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .gallery-card-field { display: flex; gap: 6px; margin-bottom: 4px; }
    .gc-label { font-size: 11px; color: var(--text3); min-width: 70px; }
    .gc-val { font-size: 11px; color: var(--text2); }
    .gallery-add-card { background: none; border: 2px dashed var(--border2); border-radius: var(--radius2); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; min-height: 180px; cursor: pointer; color: var(--text3); font-size: 24px; transition: all .15s; }
    .gallery-add-card:hover { border-color: var(--accent); color: var(--accent2); }
    .gallery-add-card span:last-child { font-size: 13px; }

    /* ══════════════════════════════════════
       CHART
    ══════════════════════════════════════ */
    .chart-controls { display: flex; gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .chart-controls select { background: var(--bg2); border: 1px solid var(--border); color: var(--text); padding: 5px 10px; border-radius: var(--radius); font-size: 12px; }
    .chart-wrap { padding: 16px; height: 380px; }
    .chart-summary { display: flex; gap: 14px; padding: 12px 16px; flex-wrap: wrap; }
    .chart-stat { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; min-width: 120px; }
    .cs-label { font-size: 11px; color: var(--text3); }
    .cs-sum { font-size: 20px; font-weight: 700; color: var(--accent2); }
    .cs-avg { font-size: 11px; color: var(--text3); }

    /* ══════════════════════════════════════
       CALENDAR
    ══════════════════════════════════════ */
    .calendar-wrap { padding: 16px; }
    .cal-header { margin-bottom: 12px; }
    .cal-header h3 { font-size: 16px; font-weight: 600; }
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .cal-dow { background: var(--bg2); text-align: center; padding: 8px; font-size: 11px; color: var(--text3); font-weight: 600; }
    .cal-cell { background: var(--bg); min-height: 90px; padding: 6px; position: relative; }
    .cal-cell.today { background: rgba(99,102,241,.08); }
    .cal-cell.empty { background: var(--bg2); }
    .cal-day-num { font-size: 12px; color: var(--text3); }
    .cal-cell.today .cal-day-num { color: var(--accent2); font-weight: 700; }
    .cal-event { background: var(--accent); color: white; border-radius: 3px; padding: 2px 5px; font-size: 11px; margin-top: 3px; cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cal-event:hover { background: var(--accent2); }
    .cal-more { font-size: 10px; color: var(--text3); margin-top: 2px; }

    /* ══════════════════════════════════════
       FORM VIEW
    ══════════════════════════════════════ */
    .form-wrap { padding: 24px; display: flex; justify-content: center; }
    .form-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius2); padding: 28px; max-width: 560px; width: 100%; }
    .form-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .form-subtitle { font-size: 13px; color: var(--text3); margin-bottom: 20px; }
    .form-field { margin-bottom: 14px; }
    .form-label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 5px; }
    .form-actions { display: flex; gap: 10px; margin-top: 20px; }
    .form-success-msg { font-size: 16px; color: var(--success); margin-bottom: 14px; }

    /* ══════════════════════════════════════
       STATUS BAR
    ══════════════════════════════════════ */
    #status-bar {
      height: 28px; display: flex; align-items: center; gap: 16px; padding: 0 14px;
      border-top: 1px solid var(--border); background: var(--bg2); flex-shrink: 0; font-size: 11px; color: var(--text3);
    }
    .page-controls { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    .btn-page { background: var(--bg3); border: 1px solid var(--border); cursor: pointer; color: var(--text2); border-radius: 4px; padding: 1px 8px; font-size: 14px; }
    .btn-page:hover:not(:disabled) { border-color: var(--accent); color: var(--accent2); }
    .btn-page:disabled { opacity: .3; cursor: default; }

    /* ══════════════════════════════════════
       RECORD PANEL
    ══════════════════════════════════════ */
    #record-panel {
      width: 360px; flex-shrink: 0; border-left: 1px solid var(--border); background: var(--bg2);
      display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    }
    #record-panel.hidden { display: none; }
    .rp-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .rp-header h2 { font-size: 15px; font-weight: 600; }
    .rp-body { flex: 1; overflow-y: auto; padding: 14px; }
    .rp-field { margin-bottom: 14px; }
    .rp-label { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text3); margin-bottom: 5px; font-weight: 500; }
    .rp-inp, .rp-sel, .rp-ta { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 7px 10px; color: var(--text); font-size: 13px; }
    .rp-inp:focus, .rp-sel:focus, .rp-ta:focus { outline: none; border-color: var(--accent); }
    .rp-ta { resize: vertical; min-height: 70px; }
    .rp-footer { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
    .rp-comments { border-top: 1px solid var(--border); padding: 12px 16px; }
    .rp-comments-title { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 10px; }
    .comment { margin-bottom: 10px; }
    .comment-ts { font-size: 10px; color: var(--text3); }
    .comment p { font-size: 12px; color: var(--text); margin-top: 2px; }
    .rp-comment-input { display: flex; gap: 6px; margin-top: 8px; }
    #rp-comment-text { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 5px 8px; color: var(--text); font-size: 12px; }
    .no-comments { font-size: 12px; color: var(--text3); }

    /* ══════════════════════════════════════
       MODALS
    ══════════════════════════════════════ */
    #modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100;
      display: flex; align-items: center; justify-content: center; padding: 20px;
      backdrop-filter: blur(4px);
    }
    #modal-overlay.hidden { display: none !important; }
    .modal {
      background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius2);
      width: 520px; max-height: 85vh; display: flex; flex-direction: column; box-shadow: var(--shadow);
      animation: modal-in .2s ease;
    }
    .modal-xl { width: 860px; }
    @keyframes modal-in { from{opacity:0;transform:scale(.96)} to{opacity:1;transform:scale(1)} }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; border-bottom: 1px solid var(--border); }
    .modal-title { font-size: 16px; font-weight: 600; }
    .modal-body { overflow-y: auto; padding: 18px; flex: 1; }
    .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }
    .modal-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 10px; color: var(--text); font-size: 13px; margin-top: 2px; }
    .modal-input:focus { outline: none; border-color: var(--accent); }
    .modal-input-sm { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 7px 10px; color: var(--text); font-size: 13px; }
    .modal-hint { font-size: 12px; color: var(--text3); margin-top: 4px; }
    .mt-2 { margin-top: 10px; }

    /* Template grid */
    .template-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-top: 6px; }
    .template-card { background: var(--bg3); border: 2px solid var(--border); border-radius: var(--radius); padding: 12px; text-align: center; cursor: pointer; transition: all .15s; display: flex; flex-direction: column; gap: 6px; font-size: 12px; }
    .template-card:hover { border-color: var(--accent); }
    .template-card.selected { border-color: var(--accent); background: rgba(99,102,241,.1); }
    .template-card span:first-child { font-size: 22px; }

    /* View type grid */
    .view-type-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
    .view-type-card { background: var(--bg3); border: 2px solid var(--border); border-radius: var(--radius); padding: 14px; text-align: center; cursor: pointer; transition: all .15s; display: flex; flex-direction: column; gap: 6px; font-size: 12px; }
    .view-type-card:hover { border-color: var(--accent); }
    .view-type-card.selected { border-color: var(--accent); background: rgba(99,102,241,.1); }
    .view-type-card span:first-child { font-size: 24px; }

    /* Filter / Sort rows */
    .filter-row, .sort-row { display: flex; gap: 6px; margin-bottom: 6px; align-items: center; }
    .fc-field, .fc-op, .sc-field, .sc-dir { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 5px 8px; color: var(--text); font-size: 12px; }
    .fc-val { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 5px 8px; color: var(--text); font-size: 12px; }
    .fc-remove, .btn-icon-sm { background: none; border: none; cursor: pointer; color: var(--text3); padding: 3px 6px; border-radius: 4px; font-size: 14px; }
    .fc-remove:hover, .btn-icon-sm:hover { background: var(--danger); color: white; }

    /* Fields list */
    .fields-list { display: flex; flex-direction: column; gap: 6px; }
    .field-row { display: flex; align-items: center; gap: 8px; padding: 5px; border-radius: var(--radius); }
    .field-row:hover { background: var(--bg3); }

    /* Import */
    .import-tabs { display: flex; gap: 4px; margin-bottom: 14px; flex-wrap: wrap; }
    .imp-tab { padding: 6px 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; color: var(--text2); font-size: 12px; }
    .imp-tab.active { background: rgba(99,102,241,.2); border-color: var(--accent); color: var(--accent2); }
    .file-drop { position: relative; border: 2px dashed var(--border2); border-radius: var(--radius); padding: 28px; text-align: center; color: var(--text3); cursor: pointer; transition: all .15s; }
    .file-drop:hover { border-color: var(--accent); color: var(--text); }
    .imp-preview { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; font-size: 11px; color: var(--text3); margin-top: 10px; overflow-x: auto; max-height: 100px; }

    /* Export options */
    .export-options { display: flex; flex-direction: column; gap: 8px; }
    .export-opt { display: flex; align-items: center; gap: 14px; padding: 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: all .15s; }
    .export-opt:hover { border-color: var(--accent); background: rgba(99,102,241,.08); }
    .eo-icon { font-size: 24px; flex-shrink: 0; }
    .eo-title { font-size: 13px; font-weight: 600; }
    .eo-desc { font-size: 11px; color: var(--text3); }

    /* Integration Hub */
    .hub-header { margin-bottom: 14px; }
    .hub-search-wrap { margin-top: 8px; }
    .hub-cats { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
    .hub-cat { padding: 5px 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; cursor: pointer; color: var(--text2); font-size: 12px; transition: all .15s; }
    .hub-cat.active { background: rgba(99,102,241,.2); border-color: var(--accent); color: var(--accent2); }
    .hub-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(240px,1fr)); gap: 10px; max-height: 55vh; overflow-y: auto; }
    .hub-card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; display: flex; align-items: flex-start; gap: 10px; transition: all .15s; }
    .hub-card:hover { border-color: var(--border2); }
    .hub-card-icon { font-size: 24px; flex-shrink: 0; }
    .hub-card-body { flex: 1; min-width: 0; }
    .hub-card-name { font-size: 13px; font-weight: 600; }
    .hub-card-desc { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .hub-badge { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 10px; margin-top: 4px; background: var(--bg); color: var(--text3); }
    .hub-connect-btn { flex-shrink: 0; background: var(--accent); border: none; color: white; border-radius: var(--radius); padding: 5px 10px; cursor: pointer; font-size: 12px; align-self: center; transition: background .15s; }
    .hub-connect-btn:hover { background: var(--accent2); }
    .integration-info { padding: 10px 0; }
    .btn-oauth { padding: 8px 16px; border: none; border-radius: var(--radius); cursor: pointer; font-size: 13px; }
    .google-btn { background: #4285f4; color: white; }
    .checkbox-group { display: flex; flex-direction: column; gap: 6px; margin-top: 6px; }
    .checkbox-group label { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text2); }

    /* Automations */
    .auto-builder { display: flex; flex-direction: column; gap: 0; }
    .auto-section { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
    .auto-section-title { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
    .auto-arrow { text-align: center; color: var(--text3); padding: 6px; font-size: 18px; }
    .auto-condition { display: flex; gap: 6px; margin-top: 6px; }

    /* API Explorer */
    .api-explorer { display: flex; flex-direction: column; gap: 14px; }
    .api-base-url { font-size: 12px; color: var(--text2); }
    .api-base-url code { background: var(--bg3); padding: 2px 6px; border-radius: 4px; color: var(--accent2); }
    .api-key-section { display: flex; align-items: center; gap: 10px; }
    .api-key-display { display: flex; align-items: center; gap: 8px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 12px; }
    .api-key-display code { font-family: monospace; font-size: 12px; color: var(--accent2); }
    .api-endpoints { display: flex; flex-direction: column; gap: 6px; }
    .api-endpoints h3, .api-example h3, .api-sdks h3 { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
    .api-ep { display: flex; align-items: center; gap: 8px; padding: 6px 10px; background: var(--bg3); border-radius: var(--radius); }
    .ep-method { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; color: white; flex-shrink: 0; }
    .ep-path { font-family: monospace; font-size: 12px; color: var(--text2); flex: 1; }
    .ep-desc { font-size: 11px; color: var(--text3); }
    .code-block { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; font-family: monospace; font-size: 12px; color: var(--text2); overflow-x: auto; white-space: pre; }
    .sdk-tabs { display: flex; gap: 4px; margin-bottom: 8px; }
    .sdk-tab { padding: 5px 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; font-size: 12px; color: var(--text2); }
    .sdk-tab.active { background: rgba(99,102,241,.2); border-color: var(--accent); color: var(--accent2); }

    /* Audit Log */
    .audit-list { display: flex; flex-direction: column; gap: 4px; max-height: 60vh; overflow-y: auto; }
    .audit-entry { display: flex; align-items: center; gap: 10px; padding: 7px 10px; background: var(--bg3); border-radius: var(--radius); }
    .audit-action { padding: 1px 8px; border-radius: 8px; font-size: 10px; font-weight: 700; }
    .audit-insert { background: rgba(16,185,129,.2); color: var(--success); }
    .audit-update { background: rgba(245,158,11,.2); color: var(--warn); }
    .audit-delete { background: rgba(239,68,68,.2); color: var(--danger); }
    .audit-table, .audit-row { font-size: 11px; color: var(--text3); }
    .audit-ts { font-size: 11px; color: var(--text3); margin-left: auto; }

    /* Share */
    .share-options { display: flex; flex-direction: column; gap: 12px; }
    .share-opt { padding: 14px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); }
    .so-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .so-desc { font-size: 11px; color: var(--text3); margin-bottom: 10px; }
    .share-link-row { display: flex; gap: 6px; }
    .toggle-row { display: flex; align-items: center; gap: 8px; font-size: 12px; cursor: pointer; }

    /* Context Menu */
    .context-menu {
      position: fixed; z-index: 200; background: var(--bg2); border: 1px solid var(--border2);
      border-radius: var(--radius); box-shadow: var(--shadow); min-width: 160px; padding: 4px;
      animation: modal-in .1s ease;
    }
    .ctx-item { padding: 8px 12px; cursor: pointer; border-radius: 5px; font-size: 13px; color: var(--text2); }
    .ctx-item:hover { background: var(--bg3); color: var(--text); }
    .ctx-item.ctx-danger { color: var(--danger); }
    .ctx-item.ctx-danger:hover { background: rgba(239,68,68,.1); }
    .ctx-sep { height: 1px; background: var(--border); margin: 4px 0; }

    /* Buttons */
    .btn-primary { background: var(--accent); color: white; border: none; border-radius: var(--radius); padding: 7px 14px; cursor: pointer; font-size: 13px; font-weight: 500; transition: background .15s; }
    .btn-primary:hover { background: var(--accent2); }
    .btn-primary.btn-lg { padding: 10px 24px; font-size: 14px; }
    .btn-secondary { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); border-radius: var(--radius); padding: 7px 14px; cursor: pointer; font-size: 13px; }
    .btn-secondary:hover { border-color: var(--accent); color: var(--text); }
    .btn-danger { background: none; border: 1px solid var(--danger); color: var(--danger); border-radius: var(--radius); padding: 7px 14px; cursor: pointer; font-size: 13px; }
    .btn-danger:hover { background: rgba(239,68,68,.1); }
    .btn-sm { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); border-radius: var(--radius); padding: 5px 10px; cursor: pointer; font-size: 12px; }
    .btn-sm:hover { border-color: var(--accent); color: var(--accent2); }
    .test-btn { background: rgba(16,185,129,.1); border: 1px solid var(--success); color: var(--success); border-radius: var(--radius); padding: 5px 10px; cursor: pointer; font-size: 12px; }
    .btn-icon { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 18px; padding: 4px 8px; border-radius: var(--radius); }
    .btn-icon:hover { background: var(--bg3); color: var(--text); }
    .btn-add-view { background: rgba(99,102,241,.15); border: 1px solid rgba(99,102,241,.3); color: var(--accent2); border-radius: var(--radius); padding: 5px 12px; cursor: pointer; font-size: 12px; flex-shrink: 0; }
    .btn-add-view:hover { background: rgba(99,102,241,.25); }

    /* Misc */
    .empty-state { display: flex; align-items: center; justify-content: center; height: 200px; color: var(--text3); font-size: 14px; }
    .hidden { display: none !important; }

    /* Toast */
    #toast-container { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 6px; z-index: 300; }
    .toast { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 16px; font-size: 13px; transform: translateX(120%); transition: transform .3s ease; max-width: 300px; box-shadow: var(--shadow); }
    .toast-show { transform: translateX(0); }
    .toast-success { border-left: 3px solid var(--success); }
    .toast-warn { border-left: 3px solid var(--warn); }
    .toast-error { border-left: 3px solid var(--danger); }
    .toast-info { border-left: 3px solid var(--accent); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

  </style>
</head>
