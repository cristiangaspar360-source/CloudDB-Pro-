<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ReservaOS — Controlador de Versiones</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f13;--bg2:#1a1a24;--bg3:#24243a;--bg4:#1e1e2e;
  --border:#2e2e45;--border2:#3d3d58;
  --accent:#6366f1;--accent2:#818cf8;--accent3:#a5b4fc;
  --teal:#0d9488;--teal2:#14b8a6;--teal3:#5eead4;
  --amber:#d97706;--amber2:#f59e0b;--amber3:#fcd34d;
  --green:#059669;--green2:#10b981;--green3:#6ee7b7;
  --red:#dc2626;--red2:#ef4444;--red3:#fca5a5;
  --text:#e8e8f0;--text2:#9b9bb5;--text3:#6b6b85;
  --radius:8px;--radius2:12px;--radius3:16px;
  --shadow:0 4px 24px rgba(0,0,0,.5);
}
html,body{min-height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:13px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
#shell{display:flex;flex-direction:column;min-height:100vh}
#header{position:sticky;top:0;z-index:100;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 28px;height:52px;display:flex;align-items:center;gap:16px}
#header .logo{font-size:15px;font-weight:700;color:var(--accent3);display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--teal2);display:inline-block;animation:pulse 2s ease infinite}
#header .subtitle{font-size:11px;color:var(--text3);border-left:1px solid var(--border);padding-left:16px;margin-left:4px}
#header .hbadge{margin-left:auto;font-size:10px;font-weight:600;background:var(--accent);color:#fff;padding:3px 10px;border-radius:99px}
#tabs{display:flex;gap:2px;padding:16px 28px 0;background:var(--bg2);border-bottom:1px solid var(--border)}
.tab{padding:8px 18px;font-size:12px;font-weight:600;color:var(--text3);border-radius:var(--radius) var(--radius) 0 0;cursor:pointer;border:1px solid transparent;border-bottom:none;transition:.15s}
.tab:hover{color:var(--text2);background:var(--bg3)}
.tab.active{color:var(--accent3);background:var(--bg);border-color:var(--border);border-bottom:1px solid var(--bg)}
#content{flex:1;padding:28px}
.section{display:none}.section.active{display:block;animation:fadeIn .2s ease}
.section-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:6px}
.section-sub{font-size:12px;color:var(--text3);margin-bottom:24px}

/* STATS */
.stats-bar{display:flex;gap:16px;margin-bottom:28px;flex-wrap:wrap}
.stat-box{flex:1;min-width:130px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:14px 18px}
.stat-val{font-size:26px;font-weight:800;line-height:1;margin-bottom:4px}
.stat-label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px}

/* TIMELINE */
.timeline{position:relative;padding-left:32px}
.timeline::before{content:'';position:absolute;left:11px;top:8px;bottom:8px;width:2px;background:linear-gradient(to bottom,var(--accent),var(--teal2),var(--amber2));border-radius:99px}
.tl-item{position:relative;margin-bottom:28px}
.tl-dot{position:absolute;left:-32px;top:14px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;border:2px solid var(--bg);z-index:1;color:#fff}
.tl-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:18px 22px;transition:.2s}
.tl-card:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.tl-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
.tl-icon{font-size:26px;line-height:1}
.tl-meta{flex:1}
.tl-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px}
.tl-date{font-size:10px;color:var(--text3);margin-bottom:6px}
.tl-tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;border:1px solid}
.tag.stack{color:var(--accent3);border-color:var(--accent);background:rgba(99,102,241,.12)}
.tag.feature{color:var(--teal3);border-color:var(--teal);background:rgba(13,148,136,.12)}
.tag.deploy{color:var(--amber3);border-color:var(--amber);background:rgba(217,119,6,.12)}
.tag.new{color:var(--green3);border-color:var(--green);background:rgba(5,150,105,.12)}
.tl-desc{font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:14px}
.tl-features{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px}
.feat-item{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text2);padding:5px 8px;background:var(--bg3);border-radius:var(--radius)}
.tl-size{font-size:10px;color:var(--text3);margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.delta{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;margin-left:8px}
.delta.up{background:rgba(16,185,129,.15);color:var(--green2)}
.delta.new{background:rgba(99,102,241,.15);color:var(--accent2)}

/* MATRIX */
.matrix-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius2)}
table.matrix{width:100%;border-collapse:collapse;min-width:600px}
.matrix th{background:var(--bg3);padding:10px 14px;font-size:11px;font-weight:700;color:var(--text2);text-align:center;border-bottom:1px solid var(--border);white-space:nowrap}
.matrix th.feat-col{text-align:left;min-width:200px}
.matrix th .ver-badge{display:block;font-size:9px;font-weight:400;color:var(--text3);margin-top:2px}
.matrix td{padding:9px 14px;border-bottom:1px solid var(--border);font-size:11px;vertical-align:middle;text-align:center}
.matrix td.feat-name{text-align:left;color:var(--text);font-weight:500}
.matrix td.feat-cat{text-align:left;color:var(--text3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;background:var(--bg4);padding:6px 14px}
.matrix tr:last-child td{border-bottom:none}
.matrix tr:hover td:not(.feat-cat){background:rgba(99,102,241,.04)}
.chk-y{color:var(--green2);font-size:15px}
.chk-n{color:var(--red2);font-size:15px;opacity:.5}
.chk-p{color:var(--amber2);font-size:12px;font-weight:600}

/* MARKET */
.market-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px;margin-bottom:28px}
.mkt-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:18px;position:relative;overflow:hidden;transition:.2s}
.mkt-card:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:var(--shadow)}
.mkt-card.highlight{border-color:var(--accent);background:linear-gradient(135deg,var(--bg2),rgba(99,102,241,.06))}
.mkt-card.highlight::before{content:'NUESTRA SOLUCIÓN';position:absolute;top:10px;right:-24px;background:var(--accent);color:#fff;font-size:9px;font-weight:700;padding:3px 28px;transform:rotate(35deg);letter-spacing:.5px}
.mkt-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
.mkt-origin{font-size:10px;color:var(--text3);margin-bottom:10px}
.mkt-price{font-size:17px;font-weight:800;color:var(--accent2);margin-bottom:4px}
.mkt-price span{font-size:11px;font-weight:400;color:var(--text3)}
.mkt-desc{font-size:11px;color:var(--text2);line-height:1.6;margin-bottom:12px}
.mkt-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.pros-label{color:var(--green2)}
.cons-label{color:var(--red2)}
.mkt-list{list-style:none;display:flex;flex-direction:column;gap:3px;margin-bottom:10px}
.mkt-list li{font-size:11px;color:var(--text2);display:flex;align-items:flex-start;gap:5px}
.pros-list li::before{content:'✓';color:var(--green2);flex-shrink:0}
.cons-list li::before{content:'✗';color:var(--red2);opacity:.7;flex-shrink:0}
.mkt-score{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.score-pill{flex:1;text-align:center;padding:5px 4px;background:var(--bg3);border-radius:var(--radius);font-size:9px;color:var(--text3)}
.score-val{display:block;font-size:14px;font-weight:800;line-height:1.2}
.score-hi{color:var(--green2)}.score-mid{color:var(--amber2)}.score-lo{color:var(--red2)}

/* BIG COMPARE */
.big-compare{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius2);margin-top:24px}
table.bc{width:100%;border-collapse:collapse;min-width:700px}
.bc th{background:var(--bg3);padding:10px 12px;font-size:11px;font-weight:700;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;text-align:center}
.bc th:first-child{text-align:left;min-width:180px}
.bc th.ours{color:var(--accent3);background:rgba(99,102,241,.08)}
.bc td{padding:8px 12px;border-bottom:1px solid var(--border);font-size:11px;text-align:center;vertical-align:middle}
.bc td:first-child{text-align:left;color:var(--text);font-weight:500}
.bc td.ours{background:rgba(99,102,241,.04)}
.bc td.cat{background:var(--bg4);color:var(--text3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.bc tr:last-child td{border-bottom:none}
.bc tr:hover td:not(.cat){background:rgba(255,255,255,.02)}
.bwin{color:var(--green2);font-weight:700}.bneu{color:var(--text2)}.blos{color:var(--red2);opacity:.7}
.badge-pill{display:inline-block;font-size:9px;font-weight:700;padding:1px 7px;border-radius:99px}
.bp-g{background:rgba(16,185,129,.15);color:var(--green2)}
.bp-a{background:rgba(245,158,11,.15);color:var(--amber2)}
.bp-r{background:rgba(239,68,68,.15);color:var(--red2)}

/* CHANGELOG */
.cl-entry{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);margin-bottom:14px;overflow:hidden}
.cl-head{display:flex;align-items:center;gap:12px;padding:12px 18px;cursor:pointer;user-select:none;transition:.15s}
.cl-head:hover{background:var(--bg3)}
.cl-ver{font-size:13px;font-weight:800;color:var(--accent2);min-width:100px}
.cl-date{font-size:11px;color:var(--text3);flex:1}
.cl-summary{font-size:11px;color:var(--text2);flex:2}
.cl-arrow{color:var(--text3);font-size:12px;transition:.2s}
.cl-entry.open .cl-arrow{transform:rotate(90deg)}
.cl-body{display:none;padding:14px 18px;border-top:1px solid var(--border);background:var(--bg)}
.cl-entry.open .cl-body{display:block}
.cl-group{margin-bottom:12px}
.cl-gtitle{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.cl-gtitle.added{color:var(--green2)}.cl-gtitle.changed{color:var(--amber2)}
.cl-gtitle.arch{color:var(--accent2)}.cl-gtitle.integr{color:var(--teal2)}
.cl-items{list-style:none;display:flex;flex-direction:column;gap:4px}
.cl-items li{font-size:11px;color:var(--text2);display:flex;gap:6px;align-items:flex-start}
.cl-items li::before{content:'→';color:var(--text3);flex-shrink:0}

/* EDIT PANEL */
#edit-panel{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center}
#edit-panel.open{display:flex}
.edit-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius3);width:min(700px,95vw);max-height:90vh;display:flex;flex-direction:column}
.edit-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.edit-head h3{font-size:14px;font-weight:700;color:var(--text)}
.edit-close{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;line-height:1}
.edit-close:hover{color:var(--text)}
.edit-body{flex:1;overflow-y:auto;padding:20px}
.edit-body p{font-size:12px;color:var(--text2);line-height:1.8;margin-bottom:16px}
.edit-body code{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-family:monospace;font-size:11px;color:var(--accent3)}
.edit-body pre{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px;font-family:monospace;font-size:11px;color:var(--teal3);overflow-x:auto;line-height:1.6;margin-bottom:16px}
.edit-body h4{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.edit-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.btn{padding:7px 16px;border-radius:var(--radius);border:none;font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{border-color:var(--border2)}
.add-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:rgba(99,102,241,.15);color:var(--accent3);border:1px solid var(--accent);border-radius:var(--radius);font-size:11px;font-weight:600;cursor:pointer;transition:.15s;margin-bottom:20px}
.add-btn:hover{background:rgba(99,102,241,.25)}

@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
</style>
</head>

// ── HELPERS ──
const h = (tag, cls, html, attrs='') => `<${tag} class="${cls}" ${attrs}>${html}</${tag}>`;
const val2html = v => {
  if (v === 'y') return '<span class="chk-y">✓</span>';
  if (v === 'n') return '<span class="chk-n">✗</span>';
  return `<span class="chk-p">${v}</span>`;
};

// ── RENDER TIMELINE ──
function renderTimeline() {
  const stats = [
    { val: VERSIONS.length, label: "Versiones", color: "var(--accent2)" },
    { val: "24", label: "Servicios", color: "var(--teal2)" },
    { val: COMPETITORS.filter(c=>!c.highlight).length, label: "Competidores", color: "var(--amber2)" },
    { val: CHANGELOG.length, label: "Cambios registrados", color: "var(--green2)" }
  ];
  let statsHtml = stats.map(s =>
    `<div class="stat-box"><div class="stat-val" style="color:${s.color}">${s.val}</div><div class="stat-label">${s.label}</div></div>`
  ).join('');

  let tlHtml = VERSIONS.map(v => {
    const badge = v.badge ? `<span class="delta ${v.badge.type}">${v.badge.text}</span>` : '';
    const tags = v.tags.map(t => `<span class="tag ${t.type}">${t.text}</span>`).join('');
    const feats = v.features.map(f =>
      `<div class="feat-item"><span>${f.icon}</span><span><b>${f.title}</b> — ${f.desc}</span></div>`
    ).join('');
    return `
    <div class="tl-item">
      <div class="tl-dot" style="background:${v.dotColor}">${v.label}</div>
      <div class="tl-card">
        <div class="tl-header">
          <div class="tl-icon">${v.icon}</div>
          <div class="tl-meta">
            <div class="tl-name">${v.name} ${badge}</div>
            <div class="tl-date">${v.date} · ${v.folder}</div>
            <div class="tl-tags">${tags}</div>
          </div>
        </div>
        <div class="tl-desc">${v.desc}</div>
        <div class="tl-features">${feats}</div>
        <div class="tl-size">${v.meta}</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('tab-timeline').innerHTML = `
    <div class="section-title">Historial de Versiones — ReservaOS</div>
    <div class="section-sub">Evolución completa desde el prototipo SaaS hasta el paquete comercial</div>
    <div class="stats-bar">${statsHtml}</div>
    <button class="add-btn" onclick="showAddGuide('version')">➕ Agregar nueva versión</button>
    <div class="timeline">${tlHtml}</div>`;
}

// ── RENDER MATRIX ──
function renderMatrix() {
  const vCols = MATRIX.cols.map(id => VERSIONS.find(v => v.id === id));
  const thead = `<tr><th class="feat-col">Funcionalidad</th>${vCols.map(v =>
    `<th>${v.name.split('—')[0].trim()}<span class="ver-badge">${v.label}</span></th>`
  ).join('')}</tr>`;
  const tbody = MATRIX.categories.map(cat => {
    const catRow = `<tr><td class="feat-cat" colspan="${vCols.length+1}">${cat.name}</td></tr>`;
    const rows = cat.rows.map(r =>
      `<tr><td class="feat-name">${r.name}</td>${r.vals.map(v => `<td>${val2html(v)}</td>`).join('')}</tr>`
    ).join('');
    return catRow + rows;
  }).join('');

  document.getElementById('tab-matrix').innerHTML = `
    <div class="section-title">Matriz de Funcionalidades</div>
    <div class="section-sub">Comparativa de capacidades entre todas las versiones de ReservaOS</div>
    <button class="add-btn" onclick="showAddGuide('feature')">➕ Agregar funcionalidad o versión</button>
    <div class="matrix-wrap"><table class="matrix"><thead>${thead}</thead><tbody>${tbody}</tbody></table></div>`;
}

      { label: "Gestión de albercas/áreas", vals: allC.map(c=> c.id==='reservaos'?'<span class="badge-pill bp-g">SÍ</span>' : c.id==='fareharbor'?'<span class="badge-pill bp-a">Parcial</span>' : '<span class="badge-pill bp-r">NO</span>') },
      { label: "Offline (sin internet)", vals: allC.map(c=> c.id==='reservaos'?'<span class="badge-pill bp-g">SÍ (v3)</span>' : '<span class="badge-pill bp-r">NO</span>') },
      { label: "Código propio / sin lock-in", vals: allC.map(c=> c.id==='reservaos'?'<span class="badge-pill bp-g">SÍ</span>' : '<span class="badge-pill bp-r">NO</span>') }
    ]}
  ].map(section => {
    const catRow = `<tr><td class="cat" colspan="${allC.length+1}">${section.cat}</td></tr>`;
    const rows = section.rows.map(r =>
      `<tr><td>${r.label}</td>${r.vals.map((v,i)=>`<td class="${allC[i].highlight?'ours':''}">${v}</td>`).join('')}</tr>`
    ).join('');
    return catRow + rows;
  }).join('');

  document.getElementById('tab-market').innerHTML = `
    <div class="section-title">Comparativa de Mercado</div>
    <div class="section-sub">ReservaOS vs principales alternativas para balnearios y centros recreativos en México y LATAM</div>
    <button class="add-btn" onclick="showAddGuide('competitor')">➕ Agregar competidor</button>
    <div class="market-grid">${cards}</div>
    <div class="section-title" style="font-size:15px;margin-bottom:6px">Tabla comparativa detallada</div>
    <div class="big-compare"><table class="bc"><thead>${bcHead}</thead><tbody>${bcRows}</tbody></table></div>`;
}

// ── RENDER CHANGELOG ──
function renderChangelog() {
  const entries = CHANGELOG.map((cl,i) => {
    const groups = cl.groups.map(g => `
      <div class="cl-group">
        <div class="cl-gtitle ${g.type}">${g.title}</div>
        <ul class="cl-items">${g.items.map(item=>`<li>${item}</li>`).join('')}</ul>
      </div>`).join('');
    return `
    <div class="cl-entry ${cl.open?'open':''}">
      <div class="cl-head" onclick="toggleCl(this)">
        <span class="cl-ver">${cl.from} → ${cl.to}</span>
        <span class="cl-date">${cl.date}</span>
        <span class="cl-summary">${cl.summary}</span>
        <span class="cl-arrow">▶</span>
      </div>
      <div class="cl-body">${groups}</div>
    </div>`;
  }).join('');

  document.getElementById('tab-changelog').innerHTML = `
    <div class="section-title">Changelog Detallado</div>
    <div class="section-sub">Registro completo de cambios entre versiones con diferencias técnicas y funcionales</div>
    <button class="add-btn" onclick="showAddGuide('changelog')">➕ Agregar entrada de changelog</button>
    ${entries}`;
}

// ── RENDER GUIDE ──
function renderGuide() {
  document.getElementById('tab-guide').innerHTML = `
    <div class="section-title">➕ Cómo agregar nuevas versiones u otros sistemas</div>
    <div class="section-sub">Todo el contenido está en bloques JSON al inicio del archivo. No necesitas tocar HTML ni CSS.</div>

    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;margin-bottom:28px">
      ${[

        { icon:'📊', title:'Nueva funcionalidad', action:'feature', desc:'Agregar fila a la matriz de features' }
      ].map(g => `
        <div class="tl-card" style="cursor:pointer" onclick="showAddGuide('${g.action}')">
          <div style="font-size:28px;margin-bottom:10px">${g.icon}</div>

          <div style="margin-top:12px;font-size:11px;color:var(--accent3);font-weight:600">Ver instrucciones →</div>
        </div>`
      ).join('')}
    </div>

    <div class="tl-card">
      <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px">Flujo general</div>
      <ol style="list-style:decimal;padding-left:18px;display:flex;flex-direction:column;gap:8px;font-size:12px;color:var(--text2)">
        <li>Abre <code>version-tracker.html</code> en cualquier editor de texto (VS Code, Notepad++, etc.)</li>

}

function showAddGuide(type) {
  const g = GUIDES[type];
  document.getElementById('ep-title').textContent = g.title;
  document.getElementById('ep-body').innerHTML = g.html;
  document.getElementById('edit-panel').classList.add('open');
}
function closePanel() { document.getElementById('edit-panel').classList.remove('open'); }

// ── TABS ──
function showTab(id, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  el.classList.add('active');
}

// ── CHANGELOG TOGGLE ──
function toggleCl(head) { head.parentElement.classList.toggle('open'); }

// ── INIT ──
document.addEventListener('DOMContentLoaded', () => {
  renderTimeline();
  renderMatrix();
  renderMarket();
  renderChangelog();
  renderGuide();
  const now = new Date();
  const m = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  document.getElementById('hbadge').textContent = `Actualizado: ${now.getDate()} ${m[now.getMonth()]} ${now.getFullYear()}`;
});
